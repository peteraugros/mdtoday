<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#B71C1C">
  <title>MD Dismiss</title>
  <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="../icons/apple-touch-icon.png">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="page">

    <header class="page-header">
      <div class="page-header__brand">
        <img class="page-header__logo" src="../icons/md-wordmark.png" alt="" aria-hidden="true">
        <span>MD Dismiss</span>
      </div>
      <a class="staff-header-back" href="/" data-staff-to-student>&larr; Student view</a>
    </header>

    <!-- PIN gate -->
    <section class="staff-pin" id="pin-section" hidden>
      <label class="staff-pin__label" id="pin-label" for="pin-input">Enter access code</label>
      <input class="staff-pin__input" id="pin-input" type="password"
             maxlength="6" autocomplete="off" inputmode="text"
             autofocus>
    </section>

    <!-- Dashboard (visible after trust) -->
    <main class="staff-dashboard" id="dashboard-section" hidden>
      <!-- Staleness banner -->
      <div class="staff-stale" id="stale-banner" hidden>
        <span class="staff-stale__icon">&#x26A0;</span>
        <span class="staff-stale__text" id="stale-text"></span>
      </div>

      <div class="staff-dashboard__heading" id="dashboard-date"></div>
      <ul class="staff-games" id="games-list"></ul>
      <div class="staff-empty" id="games-empty" hidden>No dismissals scheduled today.</div>
    </main>

  </div>

  <script type="module" src="../js/pass-staff.js"></script>
</body>
</html>
