<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#B71C1C">
  <title>MD Dismiss</title>
  <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="../icons/apple-touch-icon.png">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="page">

    <header class="page-header">
      <div class="page-header__brand">
        <img class="page-header__logo" src="../icons/md-wordmark.png" alt="" aria-hidden="true">
        <span>MD Dismiss</span>
      </div>
      <a class="staff-header-back" href="/" data-staff-to-student>&larr; Student view</a>
    </header>

    <!-- PIN gate -->
    <section class="staff-pin" id="pin-section" hidden>
      <div class="staff-pin__display" id="pin-display"></div>
      <div class="staff-pin__keypad" id="pin-keypad">
        <button class="staff-pin__key" data-key="1">1</button>
        <button class="staff-pin__key" data-key="2">2</button>
        <button class="staff-pin__key" data-key="3">3</button>
        <button class="staff-pin__key" data-key="4">4</button>
        <button class="staff-pin__key" data-key="5">5</button>
        <button class="staff-pin__key" data-key="6">6</button>
        <button class="staff-pin__key" data-key="7">7</button>
        <button class="staff-pin__key" data-key="8">8</button>
        <button class="staff-pin__key" data-key="9">9</button>
        <button class="staff-pin__key staff-pin__key--empty" disabled></button>
        <button class="staff-pin__key" data-key="0">0</button>
        <button class="staff-pin__key staff-pin__key--back" data-key="back">&larr;</button>
      </div>
    </section>

    <!-- Dashboard (visible after trust) -->
    <main class="staff-dashboard" id="dashboard-section" hidden>
      <!-- Staleness banner -->
      <div class="staff-stale" id="stale-banner" hidden>
        <span class="staff-stale__icon">&#x26A0;</span>
        <span class="staff-stale__text" id="stale-text"></span>
      </div>

      <div class="staff-dashboard__heading" id="dashboard-date"></div>
      <ul class="staff-games" id="games-list"></ul>
      <div class="staff-empty" id="games-empty" hidden>No dismissals scheduled today.</div>
    </main>

  </div>

  <script type="module" src="../js/pass-staff.js"></script>
</body>
</html>
