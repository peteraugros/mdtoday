<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#B71C1C">
  <title>MD Today — Upcoming</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="./icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MD Today">
  <link rel="stylesheet" href="./css/styles.css">
  <script>
    try {
      if (sessionStorage.getItem('mdtoday-splash-shown') === '1') {
        document.documentElement.classList.add('splash-skip');
      } else {
        sessionStorage.setItem('mdtoday-splash-shown', '1');
      }
    } catch (e) {
      document.documentElement.classList.add('splash-skip');
    }
  </script>
</head>
<body>
  <div class="splash" id="splash" aria-hidden="true">
    <div class="splash__inner">
      <img class="splash__logo" src="./icons/md-wordmark.png" alt="">
      <div class="splash__tagline">Honor · Glory · Love</div>
    </div>
  </div>

  <div class="page">

    <header class="page-header">
      <div class="page-header__brand">
        <img class="page-header__logo" src="./icons/md-wordmark.png" alt="" aria-hidden="true">
        <span>MD Today</span>
      </div>
      <div class="page-header__date" id="header-date">&mdash;</div>
    </header>
    <div class="page-version">v2.1.0</div>

    <main class="upcoming" id="upcoming">

      <!-- Validity region -->
      <section class="validity" id="validity" aria-live="polite">
        <div class="validity__icon" id="validity-icon" aria-hidden="true"></div>
        <div class="validity__body">
          <div class="validity__title" id="validity-title"></div>
          <div class="validity__detail" id="validity-detail"></div>
        </div>
      </section>

      <!-- Upcoming list (default) -->
      <section class="upcoming-list-section" id="upcoming-list-section">
        <h2 class="upcoming__heading" id="upcoming-heading">Upcoming</h2>
        <ul class="upcoming-list" id="upcoming-list"></ul>
        <div class="upcoming-empty" id="upcoming-empty" hidden>
          <div class="upcoming-empty__text" id="upcoming-empty-text"></div>
        </div>
      </section>

      <!-- Day detail (drill-in) -->
      <section class="upcoming-detail" id="upcoming-detail" hidden>
        <button class="upcoming-detail__back" id="detail-back" type="button">&larr; Back</button>
        <div class="now-header">
          <div class="now-header__label" id="detail-day-label"></div>
        </div>
        <ul class="now-blocks" id="detail-blocks-list"></ul>
        <div class="now-empty" id="detail-empty" hidden>
          <div class="now-empty__text" id="detail-empty-text"></div>
        </div>
      </section>

    </main>

    <nav class="bottomnav" aria-label="Main navigation">
      <a href="./index.html" class="bottomnav__item">
        <svg class="bottomnav__icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M12 7 V12 L15 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="bottomnav__label">Now</span>
      </a>
      <a href="./upcoming.html" class="bottomnav__item is-active" aria-current="page">
        <svg class="bottomnav__icon" viewBox="0 0 24 24" aria-hidden="true">
          <line x1="4" y1="7" x2="20" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="4" y1="17" x2="20" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="bottomnav__label">Upcoming</span>
      </a>
      <a href="./daysoff.html" class="bottomnav__item">
        <svg class="bottomnav__icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="4" y="5" width="16" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="4" y1="10" x2="20" y2="10" stroke="currentColor" stroke-width="2"/>
          <line x1="9" y1="3" x2="9" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="15" y1="3" x2="15" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="bottomnav__label">Days Off</span>
      </a>
      <a href="./sports.html" class="bottomnav__item">
        <svg class="bottomnav__icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 4h12v6a6 6 0 0 1-12 0V4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6 8H3V5h3M18 8h3V5h-3M9 20h6M12 16v4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="bottomnav__label">Sports</span>
      </a>
    </nav>

  </div>

  <script type="module" src="./js/upcoming-view.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((err) => {
          console.warn('[sw] registration failed:', err);
        });
      });
    }
  </script>
  <script>
    (function () {
      const SPLASH_HOLD_MS = 1600;
      const splash = document.getElementById('splash');
      if (!splash) return;
      if (document.documentElement.classList.contains('splash-skip')) {
        splash.remove();
        return;
      }
      let dismissed = false;
      const dismiss = () => {
        if (dismissed) return;
        dismissed = true;
        splash.classList.add('is-dismissed');
        setTimeout(() => { splash.remove(); }, 400);
      };
      splash.addEventListener('click', dismiss, { once: true });
      setTimeout(dismiss, SPLASH_HOLD_MS);
    })();
  </script>
  <script>
    // Staff access: floating button for trusted devices, 5-tap gesture for first-time setup.
    (function () {
      try {
        if (localStorage.getItem('trusted_device') === 'true') {
          var btn = document.createElement('a');
          btn.href = '/staff/';
          btn.className = 'staff-fab is-pulsing';
          btn.setAttribute('aria-label', 'Staff dismissals');
          btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.78 7.78 5.5 5.5 0 0 1 7.78-7.78zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>';
          document.body.appendChild(btn);
          setTimeout(function () { btn.classList.remove('is-pulsing'); }, 5 * 60 * 1000);
        }
      } catch (e) {}
      var brand = document.querySelector('.page-header__brand');
      if (!brand) return;
      brand.style.touchAction = 'manipulation';
      var taps = 0, timer;
      brand.addEventListener('click', function (e) {
        e.preventDefault();
        taps++;
        clearTimeout(timer);
        if (taps >= 5) { taps = 0; window.location.href = '/staff/'; return; }
        timer = setTimeout(function () { taps = 0; }, 1500);
      });
    })();
  </script>
  <script data-goatcounter="https://mdtoday.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</body>
</html>
