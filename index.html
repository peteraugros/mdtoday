<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Today</title>
</head>
<body>
  <p>MD Today — dev shell. Open DevTools console.</p>

  <script type="module">
    import * as data from './js/data.js';
    import { resolveDay } from './js/resolve.js';
    import { getCurrentStatus } from './js/schedule.js';
  
    console.log('--- Schedule test ---');
  
    const payload = await data.loadData();
  
    // Use a known Red Day (Tuesday 2025-08-26) for deterministic time tests
    const redDayDate = '2025-08-26';
    const resolvedRed = resolveDay(payload, new Date(`${redDayDate}T10:00:00`));
    console.log('Using:', resolvedRed.dayLabel, '-', resolvedRed.templateId);
    console.log('Template blocks:');
    console.table(resolvedRed.template.blocks);
  
    // Helper to test at a specific wall-clock time
    function at(hhmm) {
      const [h, m] = hhmm.split(':').map(n => parseInt(n, 10));
      const d = new Date(`${redDayDate}T00:00:00`);
      d.setHours(h, m, 0, 0);
      return d;
    }
  
    function testAt(label, hhmm) {
      const status = getCurrentStatus(resolvedRed.template, at(hhmm));
      console.log(`\n[${hhmm} — ${label}]`);
      console.log('  status:', status.status);
      if (status.currentBlock) console.log('  currentBlock:', status.currentBlock.block_name, `(${status.currentBlock.start_time}-${status.currentBlock.end_time})`);
      if (status.currentTracks) {
        console.log('  currentTracks.upper:', status.currentTracks.upper.block_name, `(${status.currentTracks.upper.start_time}-${status.currentTracks.upper.end_time})`);
        console.log('  currentTracks.lower:', status.currentTracks.lower.block_name, `(${status.currentTracks.lower.start_time}-${status.currentTracks.lower.end_time})`);
      }
      if (status.nextBlock) console.log('  nextBlock:', status.nextBlock.block_name, `(${status.nextBlock.start_time}-${status.nextBlock.end_time})`);
      console.log('  secondsToNextTransition:', status.secondsToNextTransition);
    }
  
    // Red Day bell schedule:
    //   Block 1    08:00-09:15
    //   Block 3    09:20-10:45
    //   Block 5    10:50-12:05 (lower)  /  Upper Lunch 10:50-11:30
    //   Upper Class 11:35-12:50 (upper) /  Lower Lunch 12:10-12:50
    //   Block 7    12:55-14:10
    //   Office Hr  14:20-15:00
  
    testAt('before school', '07:30');
    testAt('in Block 1', '08:30');
    testAt('passing period', '09:17');
    testAt('in Block 3', '10:00');
    testAt('passing to lunch window', '10:47');
    testAt('lunch window early (upper eating, lower in class)', '11:00');
    testAt('lunch window middle (upper back in class, lower still in class)', '11:45');
    testAt('lunch window late (upper in class, lower at lunch)', '12:30');
    testAt('in Block 7', '13:30');
    testAt('passing to office hour', '14:15');
    testAt('in Office Hour', '14:30');
    testAt('after school', '15:30');
  </script>
</body>
</html>
