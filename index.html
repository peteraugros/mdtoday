<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Today</title>
</head>
<body>
  <p>MD Today — dev shell. Open DevTools console.</p>

  <script type="module">
    import * as data from './js/data.js';
    import { resolveDay } from './js/resolve.js';
  
    console.log('--- Resolve test ---');
  
    const payload = await data.loadData();
    console.log('source:', payload.source, '| events:', payload.events.length);
  
    // Test 1: Today
    const today = resolveDay(payload);
    console.log('\n[Today]');
    console.log('  dayLabel:', today.dayLabel);
    console.log('  templateId:', today.templateId);
    console.log('  trustState:', today.trustState);
    console.log('  isDayOff:', today.isDayOff);
    console.log('  announcement:', today.announcement);
    console.log('  blocks:', today.template?.blocks.length);
    console.log('  unmatchedSummary:', today.unmatchedSummary);
  
    // Test 2: A known Red Day on a non-Monday (Tuesday 8/26/2025)
    const redTuesday = resolveDay(payload, new Date('2025-08-26T10:00:00'));
    console.log('\n[Tuesday 2025-08-26 — expected Red Day]');
    console.log('  dayLabel:', redTuesday.dayLabel);
    console.log('  templateId:', redTuesday.templateId);
    console.log('  trustState:', redTuesday.trustState);
  
    // Test 3: A Monday Red Day — should substitute to monday_homeroom
    const mondayRed = resolveDay(payload, new Date('2025-08-18T10:00:00'));
    console.log('\n[Monday 2025-08-18 — expected Monday Red]');
    console.log('  dayLabel:', mondayRed.dayLabel);
    console.log('  templateId:', mondayRed.templateId);
    console.log('  expected templateId: monday_homeroom');
  
    // Test 4: A weekend day — no events, should be Assumed
    const saturday = resolveDay(payload, new Date('2025-09-06T10:00:00'));
    console.log('\n[Saturday 2025-09-06 — expected no events]');
    console.log('  dayLabel:', saturday.dayLabel);
    console.log('  templateId:', saturday.templateId);
    console.log('  trustState:', saturday.trustState);
    console.log('  expected trustState: assumed (weekday-or-weekend, no event)');
  
    // Test 5: Thanksgiving Break (if present in feed)
    const thanksgiving = resolveDay(payload, new Date('2025-11-27T10:00:00'));
    console.log('\n[Thursday 2025-11-27 — expected Thanksgiving Break]');
    console.log('  dayLabel:', thanksgiving.dayLabel);
    console.log('  isDayOff:', thanksgiving.isDayOff);
    console.log('  dayOffLabel:', thanksgiving.dayOffLabel);
  
    // Test 6: Offline payload — should return offline state
    const offlineResult = resolveDay({ source: 'none', events: [], templates: [], summaryMap: [] });
    console.log('\n[Offline payload]');
    console.log('  trustState:', offlineResult.trustState);
    console.log('  expected: offline');
  
    // Test 7: A day with a rally event — should set announcement
    // Look for any rally event and test its date
    const rallyEvent = payload.events.find(e =>
      /^homecoming rally|^fall rally|^winter rally|^spring rally/i.test(e.summary)
    );
    if (rallyEvent) {
      console.log('\n[Testing announcement via rally event on', rallyEvent.date, ']');
      const [y, m, d] = rallyEvent.date.split('-').map(n => parseInt(n, 10));
      const rallyDay = resolveDay(payload, new Date(y, m - 1, d, 10, 0));
      console.log('  dayLabel:', rallyDay.dayLabel);
      console.log('  announcement:', rallyDay.announcement);
      console.log('  (rally event SUMMARY was:', rallyEvent.summary, ')');
    }
  </script>
</body>
</html>
