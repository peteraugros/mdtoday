<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#B71C1C">
  <title>MD Today</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="./icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MD Today">
  <link rel="stylesheet" href="./css/styles.css">
  <script>
    // Splash gating — runs synchronously before <body> renders. Only show the
    // splash once per browser session. SessionStorage clears when all tabs of
    // the origin close, matching the intended "first launch this session" UX.
    //
    // We set a class on <html> rather than touching <body> because <body>
    // doesn't exist yet at this point in parsing. The class is read by CSS
    // to either show the splash or skip it entirely.
    try {
      if (sessionStorage.getItem('mdtoday-splash-shown') === '1') {
        document.documentElement.classList.add('splash-skip');
      } else {
        sessionStorage.setItem('mdtoday-splash-shown', '1');
      }
    } catch (e) {
      // sessionStorage unavailable (private mode / disabled) — skip the splash
      // rather than risk it never fading out.
      document.documentElement.classList.add('splash-skip');
    }
  </script>
</head>
<body>
  <div class="splash" id="splash" aria-hidden="true">
    <div class="splash__inner">
      <img class="splash__logo" src="./icons/md-wordmark.png" alt="">
      <div class="splash__tagline">Honor · Glory · Love</div>
    </div>
  </div>

  <div class="page">

    <header class="page-header">
      <div class="page-header__brand">
        <img class="page-header__logo" src="./icons/md-wordmark.png" alt="" aria-hidden="true">
        <span>MD Today</span>
      </div>
      <div class="page-header__date" id="header-date">—</div>
    </header>
    <div class="page-version">v1.0.4</div>

    <main class="now" id="now">

      <!-- Validity region — trust state banner -->
      <section class="validity" id="validity" aria-live="polite">
        <div class="validity__icon" id="validity-icon" aria-hidden="true"></div>
        <div class="validity__body">
          <div class="validity__title" id="validity-title"></div>
          <div class="validity__detail" id="validity-detail"></div>
        </div>
      </section>

      <!-- Temporal region — current period + countdown -->
      <section class="temporal" id="temporal" aria-live="polite">
        <div class="temporal__day-label" id="day-label">Loading…</div>
        <div class="temporal__status" id="status-text">—</div>
        <div class="temporal__countdown" id="countdown-text"></div>

        <!-- Track branching slot (shown only during lunch window) -->
        <div class="temporal__tracks" id="tracks" hidden>
          <div class="track track--upper">
            <div class="track__label">Upper Lunch</div>
            <div class="track__block" id="track-upper-block"></div>
            <div class="track__time" id="track-upper-time"></div>
          </div>
          <div class="track track--lower">
            <div class="track__label">Lower Lunch</div>
            <div class="track__block" id="track-lower-block"></div>
            <div class="track__time" id="track-lower-time"></div>
          </div>
        </div>

        <div class="temporal__next" id="next-slot" hidden>
          Next: <strong id="next-block-name"></strong>
          <span id="next-block-time"></span>
        </div>
      </section>

      <!-- Deviation region — announcement banner -->
      <section class="deviation" id="deviation" aria-live="polite">
        <div class="deviation__icon" aria-hidden="true">📣</div>
        <div class="deviation__text" id="deviation-text"></div>
      </section>

    </main>

    <nav class="bottomnav" aria-label="Main navigation">
      <a href="./index.html" class="bottomnav__item is-active" aria-current="page">
        <svg class="bottomnav__icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M12 7 V12 L15 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="bottomnav__label">Now</span>
      </a>
      <a href="./schedule.html" class="bottomnav__item">
        <svg class="bottomnav__icon" viewBox="0 0 24 24" aria-hidden="true">
          <line x1="4" y1="7" x2="20" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="4" y1="17" x2="20" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="bottomnav__label">Schedule</span>
      </a>
      <a href="./daysoff.html" class="bottomnav__item">
        <svg class="bottomnav__icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="4" y="5" width="16" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="4" y1="10" x2="20" y2="10" stroke="currentColor" stroke-width="2"/>
          <line x1="9" y1="3" x2="9" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="15" y1="3" x2="15" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="bottomnav__label">Days off</span>
      </a>
    </nav>

  </div>

  <script type="module" src="./js/app.js"></script>
  <script>
    // Service worker registration. Standalone (not a module) so it runs on
    // every browser including ones with flaky module support. If the browser
    // doesn't support SW, nothing happens — the app still works, just without
    // the offline shell.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((err) => {
          console.warn('[sw] registration failed:', err);
        });
      });
    }
  </script>
  <script>
    // Splash dismissal — runs after the splash element exists in the DOM.
    // Two paths trigger dismissal:
    //   1. Auto-fade after SPLASH_HOLD_MS
    //   2. User taps anywhere on the splash
    // Either path adds .is-dismissed which triggers the CSS fade-out
    // transition. The element is fully removed from the layout via
    // pointer-events:none after the fade so it doesn't intercept taps.
    (function () {
      const SPLASH_HOLD_MS = 1600; // visible duration before auto-fade begins
      const splash = document.getElementById('splash');
      if (!splash) return;
      if (document.documentElement.classList.contains('splash-skip')) {
        // Skip path — remove from DOM immediately, no fade.
        splash.remove();
        return;
      }

      let dismissed = false;
      const dismiss = () => {
        if (dismissed) return;
        dismissed = true;
        splash.classList.add('is-dismissed');
        // Remove from DOM after fade completes (matches CSS transition duration).
        setTimeout(() => { splash.remove(); }, 400);
      };

      splash.addEventListener('click', dismiss, { once: true });
      setTimeout(dismiss, SPLASH_HOLD_MS);
    })();
  </script>
</body>
</html>
