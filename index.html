<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Today</title>
</head>
<body>
  <p>MD Today — dev shell. Open DevTools console.</p>

  <script type="module">
    import * as data from './js/data.js';
  
    console.log('--- Live fetch test ---');
    console.log('Fetching... (check Network tab if this hangs)');
  
    const payload = await data.loadData();
  
    console.log('source:', payload.source);
    console.log('lastFetch:', payload.lastFetch);
    console.log('warnings:', payload.warnings);
    console.log('events count:', payload.events.length);
    console.log('templates count:', payload.templates.length);
    console.log('summaryMap count:', payload.summaryMap.length);
  
    console.log('first 3 events:', payload.events.slice(0, 3));
    console.log('first 3 templates:', payload.templates.slice(0, 3));
    console.log('full summaryMap:', payload.summaryMap);
  
    // Count distinct template_ids that appear in the templates data
    const distinctTemplates = [...new Set(payload.templates.map(r => r.template_id))];
    console.log('distinct template_ids:', distinctTemplates);
  
    // Today's events (if any)
    const today = new Date();
    const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    const todayEvents = payload.events.filter(e => e.date === todayStr);
    console.log(`events on ${todayStr}:`, todayEvents);
  </script>
</body>
</html>
