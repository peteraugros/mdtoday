<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Today</title>
</head>
<body>
  <p>MD Today — dev shell. Open DevTools console.</p>

  <script type="module">
    import * as data from './js/data.js';
  
    console.log('--- Sanitizer tests ---');
  
    // sanitizeSummary
    console.log('trim:', JSON.stringify(data.sanitizeSummary('   RED: B. 1, 3, 5, 7   ')));
    console.log('collapse:', JSON.stringify(data.sanitizeSummary('RED:  B.   1,  3,  5,  7')));
    console.log('empty:', JSON.stringify(data.sanitizeSummary('')));
    console.log('non-string:', JSON.stringify(data.sanitizeSummary(null)));
  
    // sanitizeTime
    console.log('short:', data.sanitizeTime('8:00'));           // "08:00"
    console.log('long:', data.sanitizeTime('08:00'));           // "08:00"
    console.log('pm:', data.sanitizeTime('1:30 PM'));           // "13:30"
    console.log('am midnight:', data.sanitizeTime('12:00 AM')); // "00:00"
    console.log('pm noon:', data.sanitizeTime('12:00 PM'));     // "12:00"
    console.log('garbage:', data.sanitizeTime('not a time'));   // null
    console.log('bad hour:', data.sanitizeTime('25:00'));       // null
  
    // sanitizeTemplatesRows
    console.log('template rows:', data.sanitizeTemplatesRows([
      { template_id: ' RED_REGULAR ', block_order: '1', block_name: ' Block 1 ', start_time: '8:00', end_time: '9:15', track: '' },
      { template_id: 'red_regular', block_order: '3', block_name: 'Upper Lunch', start_time: '10:50', end_time: '11:30', track: 'UPPER' },
      { template_id: '', block_order: '', block_name: '', start_time: '', end_time: '', track: '' }, // should be dropped
    ]));
  
    // sanitizeSummaryMapRows
    console.log('summary map rows:', data.sanitizeSummaryMapRows([
      { calendar_summary: '  RED: B. 1, 3, 5, 7  ', template_id: ' RED_REGULAR ' },
      { calendar_summary: '', template_id: '' }, // should be dropped
    ]));
  </script>
</body>
</html>
